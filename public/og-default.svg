            <stop offset="100%" stop-color="#f5ead5" />
        </linearGradient>
        <radialGradient id="accentGlow" cx="80%" cy="20%" r="60%">
            <stop offset="0%" stop-color="#e8b679" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#e8b679" stop-opacity="0" />
        </radialGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bgGrad)" />
    <rect width="1200" height="630" fill="url(#accentGlow)" />

    <g transform="translate(96, 96)">
